name: CI — Render Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  backend-ci:
    name: Backend — Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Backend/package-lock.json
      - name: Install dependencies
        run: npm ci --omit=dev
      - name: Syntax check entry point
        run: node --check src/server.js

  frontend-ci:
    name: Frontend — Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build production bundle
        run: npm run build
        env:
          VITE_API_URL: https://myrvvault-backend.onrender.com/api

  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    steps:
      - name: Trigger Backend deploy
        run: curl --silent --show-error --fail -X POST "${{ secrets.RENDER_BACKEND_DEPLOY_HOOK }}"
      - name: Trigger Frontend deploy
        run: curl --silent --show-error --fail -X POST "${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK }}"

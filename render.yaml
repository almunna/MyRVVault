services:
  # ─── Backend: Web Service (Docker) ───────────────────────────────────────────
  - type: web
    name: my-rv-vault-backend
    runtime: docker
    branch: master
    dockerfilePath: Backend/Dockerfile
    dockerContext: Backend
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_ANDROID_CLIENT_ID
        sync: false
      - key: GOOGLE_IOS_CLIENT_ID
        sync: false
      - key: APPLE_CLIENT_ID
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: EMAIL_PORT
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: EMAIL_SERVICE
        sync: false
      - key: SERVICE_NAME
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        value: eu-north-1
      - key: AWS_BUCKET_NAME
        value: my-rv-vault
      - key: FIREBASE_SERVICE_ACCOUNT
        sync: false

  # ─── Frontend: Static Site ────────────────────────────────────────────────────
  - type: web
    name: my-rv-vault-frontend
    runtime: static
    branch: master
    buildCommand: cd Frontend && npm ci && npm run build
    staticPublishPath: Frontend/dist
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false
      - key: VITE_GOOGLE_MAP_KEY
        sync: false
      - key: VITE_GOOGLE_CLIENT_ID
        sync: false
